<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .element{
            width: 200px;
            height: 200px;
            background-color: aqua;
            text-align: center;
            font-weight: bold;
        }
    </style>

</head>
<body>
    <input class="texto" type="text">
    <button type="button" onclick="crearElement()">Agregar elemento</button> 
    <br>
    <br>
    <label for="">R</label>
    <input class="r" type="number" min="0" max="255">
    <label for="">G</label>
    <input class="g" type="number" min="0" max="255">
    <label for="">B</label>
    <input class="b" type="number" min="0" max="255">
    <br>
    <br>
    <div class="container">
    </div>

    <script>
        const container = document.querySelector(".container");
    const texto = document.querySelector(".texto");

    function crearElement(){
        let r = document.querySelector(".r").value;
        let g = document.querySelector(".g").value;
        let b = document.querySelector(".b").value;
        let element = document.createElement("div");

        element.textContent = texto.value;
        element.className = "element";
        element.style.backgroundColor = "rgb(" + r + "," + g + "," + b + ")";
        container.appendChild(element);

        texto.value = "";
}
    </script>
</body>
</html>
